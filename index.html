<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAXÍMETRO EDOMEX</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            margin: 0;
        }
        .container {
            background: white;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            padding: 20px;
            text-align: center;
        }
        .header {
            background: linear-gradient(135deg, #006400 0%, #228B22 100%);
            color: #FFD700;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 1.5em;
            margin: 0;
        }
        .display {
            background: #000;
            color: #00ff88;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
        }
        .tarifa {
            font-size: 3em;
            font-weight: bold;
        }
        .info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        .info-item {
            background: rgba(0,255,136,0.1);
            padding: 10px;
            border-radius: 8px;
        }
        .label {
            font-size: 0.7em;
            color: #00cc6a;
        }
        .value {
            font-size: 1.2em;
        }
        .gps-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 10px 0;
            font-size: 0.9em;
        }
        .gps-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .gps-activo { background: #00ff88; }
        .gps-inactivo { background: #d63031; }
        .btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            width: 100%;
        }
        .btn-iniciar {
            background: #00b894;
            color: white;
        }
        .btn-detener {
            background: #d63031;
            color: white;
        }
        .debug {
            background: #fff3cd;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 0.8em;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚕 TAXÍMETRO EDOMEX</h1>
            <div style="font-size: 0.8em;">Edo. México</div>
        </div>

        <div class="debug" id="debugInfo">
            <strong>Estado GPS:</strong> <span id="debugText">Esperando...</span>
        </div>

        <div class="display">
            <div class="tarifa" id="tarifa">$0.00</div>
            <div class="info">
                <div class="info-item">
                    <div class="label">Km</div>
                    <div class="value" id="km">0.000</div>
                </div>
                <div class="info-item">
                    <div class="label">Tiempo</div>
                    <div class="value" id="tiempo">00:00</div>
                </div>
                <div class="info-item">
                    <div class="label">Espera</div>
                    <div class="value" id="espera">00:00</div>
                </div>
                <div class="info-item">
                    <div class="label">Velocidad</div>
                    <div class="value" id="velocidad">0 km/h</div>
                </div>
            </div>
            <div class="gps-status">
                <div class="gps-dot gps-inactivo" id="gpsDot"></div>
                <span id="gpsText">GPS: Buscando señal...</span>
            </div>
        </div>

        <button class="btn btn-iniciar" id="btnIniciar" onclick="iniciarGPS()">🟢 INICIAR GPS</button>
        <button class="btn btn-detener" id="btnDetener" onclick="detenerGPS()" disabled>🔴 DETENER</button>
        
        <div style="margin-top: 15px; font-size: 0.8em; color: #666;">
            <p>Coordenadas: <span id="coords">-</span></p>
        </div>
    </div>

    <script>
        let watchId = null;
        let ultimaPos = null;
        let distanciaTotal = 0;
        let timerInterval = null;
        let tiempoInicio = null;

        function actualizarDebug(msg) {
            document.getElementById('debugText').textContent = msg;
        }

        function actualizarGPS(activo, msg) {
            const dot = document.getElementById('gpsDot');
            const text = document.getElementById('gpsText');
            dot.className = 'gps-dot ' + (activo ? 'gps-activo' : 'gps-inactivo');
            text.textContent = msg;
        }

        function iniciarGPS() {
            if (!navigator.geolocation) {
                actualizarDebug('❌ Tu dispositivo no soporta GPS');
                alert('Tu dispositivo no soporta geolocalización');
                return;
            }

            actualizarDebug('📡 Solicitando permiso de ubicación...');

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    // Éxito - GPS funcionando
                    actualizarDebug('✅ GPS FUNCIONANDO! Lat: ' + position.coords.latitude.toFixed(6));
                    actualizarGPS(true, 'GPS: Señal activa ✓');
                    
                    document.getElementById('coords').textContent = 
                        position.coords.latitude.toFixed(5) + ', ' + position.coords.longitude.toFixed(5);
                    
                    ultimaPos = {
                        lat: position.coords.latitude,
                        lon: position.coords.longitude,
                        timestamp: Date.now()
                    };
                    
                    document.getElementById('btnIniciar').disabled = true;
                    document.getElementById('btnDetener').disabled = false;
                    
                    // Iniciar monitoreo continuo
                    iniciarMonitoreo();
                },
                function(error) {
                    // Error
                    actualizarGPS(false, 'GPS: Error');
                    
                    let msg = '';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            msg = '❌ PERMISO DENEGADO. Ve a Configuración de Chrome > Ubicación > Permitir';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            msg = '❌ Señal no disponible. ¿Estás en interiores?';
                            break;
                        case error.TIMEOUT:
                            msg = '❌ Tiempo agotado';
                            break;
                    }
                    actualizarDebug(msg);
                    alert(msg);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                }
            );
        }

        function iniciarMonitoreo() {
            watchId = navigator.geolocation.watchPosition(
                function(position) {
                    const nuevaPos = {
                        lat: position.coords.latitude,
                        lon: position.coords.longitude,
                        timestamp: Date.now()
                    };
                    
                    document.getElementById('coords').textContent = 
                        nuevaPos.lat.toFixed(5) + ', ' + nuevaPos.lon.toFixed(5);
                    
                    if (ultimaPos) {
                        const distancia = calcularDistancia(
                            ultimaPos.lat, ultimaPos.lon,
                            nuevaPos.lat, nuevaPos.lon
                        );
                        if (distancia > 0.001) {
                            distanciaTotal += distancia;
                            document.getElementById('km').textContent = distanciaTotal.toFixed(3);
                        }
                    }
                    
                    ultimaPos = nuevaPos;
                    actualizarGPS(true, 'GPS: Activo ✓');
                },
                function(error) {
                    actualizarGPS(false, 'GPS: Error');
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                     Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                     Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function detenerGPS() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            actualizarGPS(false, 'GPS: Detenido');
            actualizarDebug('GPS detenido. Distancia: ' + distanciaTotal.toFixed(3) + ' km');
            document.getElementById('btnIniciar').disabled = false;
            document.getElementById('btnDetener').disabled = true;
        }
    </script>
</body>
</html>
